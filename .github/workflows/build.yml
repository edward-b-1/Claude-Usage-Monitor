name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Usage-Monitor-Windows
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 30
